{% extends "base_generic.html" %}
{% block content %}
        <div class="container m-2 mt-1">
          <h1>Мақалалар Мұрағаты</h1>
          <form action="{%url 'search'%}" method="get">
            <input class="search-field form-control" name="q" placeholder="Макалаларды Іздеу..">
            <button class="btn mt-3" style="background-color:#bf4342; color: #fff;">Іздеу</button>
          </form>
        {% if articles_list %}
          <div class="row">
            {% for article in articles_list %}
              <div class="col-sm-4 mb-4 mt-3">
                <div class="card" style="width: 18rem;">
                  <!-- <img src="{{article.image}}" class="card-img-top" alt=""> -->
                  <div class="card-body">
                    <h4 class="card-title">
                      <a href="{{ article.get_absolute_url }}">{{ article.title }}</a>
                    </h4>
                    <a href="{{ article.get_absolute_url }}" class="card-link">толығырақ оқыңыз</a>
                  </div>
                </div>
              </div>
            {% endfor %}
          </div>
        </div>
    {% else %}
      <p>Мұрағатта мақалалар жоқ.</p>
    {% endif %}

{% endblock %}
