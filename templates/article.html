{% extends "base_generic.html" %}
{% block content %}
    <h1>Мақалалар Мұрағаты</h1>

    
<form action="{%url 'search'%}" method="get">
  <input class="search-field" name="q" placeholder="Макалаларды Іздеу..">
  <button type="submit" > Іздеу</button>
</form>

    {% if articles_list %}
        <div class="container">
          <div class="row">
            {% for article in articles_list %}
              <div class="col-sm-4 mb-4 mt-3">
                <div class="card">
                  <div class="card-body">
                    <h4 class="card-title">
                      <a href="{{ article.get_absolute_url }}">{{ article.title }}</a>
                    </h4>
                    <a href="{{ article.get_absolute_url }}" class="card-link">толығырақ оқыңыз</a>
                  </div>
                </div>
              </div>
            {% endfor %}
          </div>
        </div>
    {% else %}
      <p>Мұрағатта мақалалар жоқ.</p>
    {% endif %}

{% endblock %}
