{% extends "base_generic.html" %}
{% block content %}
<h2>Тіркелу</h2>
<form action="{% url 'rega' %}" method="post">
    {% csrf_token %}
    {% for field in form %}
        <div class="regafieldWrapper">
            {{ field.label_tag }} {{ field }}
            {{ field.errors }}
        </div>
    {% endfor %}
    <button class="btn mt-3" style="background-color:#bf4342; color: #fff;">Тіркелу</button>
</form>
{% endblock %}
